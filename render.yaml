services:
  # Backend Service
  - type: web
    name: document-spit-be
    runtime: docker
    rootDir: Document_SPIT_BE
    dockerContext: .
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ALLOWED_ORIGINS
        value: https://document-spit.onrender.com
      # Các biến sau cần cấu hình tay trên Dashboard Render hoặc file .env
      - key: DB_SERVER
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: https://document-spit-be.onrender.com
      - key: JWT_AUDIENCE
        value: https://document-spit.onrender.com

  # Frontend Service
  - type: web
    name: document-spit-fe
    runtime: docker
    rootDir: frontend_document
    dockerContext: .
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: NEXT_PUBLIC_API_URL
        value: https://document-spit-be.onrender.com
      - key: NEXT_PUBLIC_WEB_URL
        value: https://document-spit.onrender.com
      - key: NEXT_PUBLIC_LIMIT_SIZE
        value: "50"
      - key: NEXT_PUBLIC_MAX_SIZE_FILE
        value: "100"
